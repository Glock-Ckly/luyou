<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>路由实验室 · luyou</title><link rel="stylesheet" href="assets/styles.css"></head><body data-page="routing"><header data-header></header><main class="shell">
<section class="hero"><div><p class="eyebrow">Page 02 / 路由实验室</p><h1>从任务输入到真实执行。</h1><p class="lede">调用统一 Dispatcher，展示分类、模型选择、Trace ID、执行时间线和 Provider 尝试链。</p></div><aside class="hero-note"><strong>安全边界</strong>工作目录只能位于服务端允许的根目录内。</aside></section>
<section class="section grid grid-2"><article class="card"><label class="field"><span>任务描述</span><textarea id="route-prompt" rows="7">设计一个支持重试与降级的订单缓存方案</textarea></label><label class="field"><span>工作目录</span><input id="route-workdir"></label><button class="button" id="route-submit">开始路由</button></article><article class="card"><p class="eyebrow">Decision</p><h2>路由结果</h2><div class="row"><span>Trace ID</span><strong id="route-trace">—</strong></div><div class="row"><span>任务类型</span><strong id="route-task">—</strong></div><div class="row"><span>模型</span><strong id="route-model">—</strong></div><div class="row"><span>执行器</span><strong id="route-executor">—</strong></div></article></section>
<section class="section grid grid-2"><article class="card"><p class="eyebrow">Timeline + attempts</p><h2>执行时间线</h2><div id="route-timeline" class="timeline"></div></article><article class="card"><p class="eyebrow">Normalized response</p><h2>执行结果</h2><pre id="route-result" class="code">等待执行。</pre></article></section><section class="section"><div class="section-head"><div><p class="eyebrow">Subtasks</p><h2>子任务</h2></div></div><div id="route-subtasks" class="grid grid-2"><div class="empty">尚无子任务。</div></div></section>
</main><footer data-footer></footer><div class="toast"></div><script src="assets/app.js"></script></body></html>
