syntax = "proto3";

package luyou.modelrouter.v1;

service ModelRouter {
  rpc RouteAndExecute(RouteRequest) returns (RouteResponse);
}

message RouteRequest {
  string trace_id = 1;
  string prompt = 2;
  string requested_model = 3;
}

message Attempt {
  string model_id = 1;
  uint32 attempt = 2;
  string status = 3;
  string action = 4;
  string error_type = 5;
  uint64 latency_ms = 6;
}

message RouteResponse {
  string trace_id = 1;
  string selected_model = 2;
  string content = 3;
  repeated Attempt attempts = 4;
}
